[spacebar]
shift       = "\u202f"  # NARROW NO-BREAK SPACE
altgr       = "\u005f"  # LOW LINE (underscore)
altgr_shift = "\u00a0"  # NO-BREAK SPACE
1dk         = "\u2019"  # RIGHT SINGLE QUOTATION MARK
1dk_shift   = "\u2019"  # RIGHT SINGLE QUOTATION MARK  but with a underscore for altgr+space

