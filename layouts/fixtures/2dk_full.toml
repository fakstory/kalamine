description = "QWERTY base+altgr (via `full`) + 2dk overlay exercising all 8 levels"
url = "https://OneDeadKey.github.com/kalamine/"
version = "1.0.0"
geometry = "ISO"

# Goal: every level (1-8) of the `KALAMINE_DK2` custom type carries a
# distinct, easily distinguishable glyph on a single key (Q, AD01).
# Tests pin each level so an off-by-one in `_parse_template`
# (col_offset for DK2 vs DK2_ALTGR) or in
# `xkb_2dk.collect_eight_level_symbols` is caught.
#
# Cell encoding (same as the existing `full` template):
#   inner-left position  → BASE half (BASE/SHIFT or DK2/DK2_SHIFT)
#   inner-right position → ALTGR half (ALTGR/ALTGR_SHIFT or DK2_ALTGR/DK2_ALTGR_SHIFT)
#
# Q (AD01) layer plan:
#   level 1 (base)              → q
#   level 2 (shift)             → Q
#   level 3 (altgr)             → 1
#   level 4 (altgr+shift)       → 2
#   level 5 (DK2 base)          → α
#   level 6 (DK2 shift)         → Α
#   level 7 (DK2 altgr)         → 3
#   level 8 (DK2 altgr+shift)   → 4
#
# Trigger key W carries `++` (base) and `--` (shift).

